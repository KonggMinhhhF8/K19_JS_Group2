<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo Cáo Doanh Thu | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="report.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">
    <aside class="sidebar">
      <h2>ShopAdmin</h2>
      <ul>
        <li onclick="window.location.href='../index.html'">
          <i class="fas fa-home"></i> Tổng quan
        </li>
        <li onclick="window.location.href='../products/index.html'">
          <i class="fas fa-box"></i> Sản phẩm
        </li>
        <li onclick="window.location.href='../orders/index.html'">
          <i class="fas fa-shopping-cart"></i> Đơn hàng
        </li>
        <li onclick="window.location.href='../customers/index.html'">
          <i class="fas fa-users"></i> Khách hàng
        </li>
        <li class="active">
          <i class="fas fa-chart-line"></i> Báo cáo
        </li>
      </ul>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Đăng xuất
      </button>
    </aside>

    <main class="main-content">
      <header>
        <h2>Báo cáo kinh doanh</h2>
        <div class="filter-group">
          <input type="date" id="fromDate">
          <input type="date" id="toDate">
          <button id="btnFilter">Lọc</button>
        </div>
        <div class="user-info" id="userInfo">
          <i class="fas fa-user-circle"></i>
          <span id="userName">Admin</span>
        </div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <h4>Doanh thu</h4>
          <div class="value" id="totalRevenue">0đ</div>
          <div class="trend up" id="revenueTrend"><i class="fas fa-arrow-up"></i> --</div>
        </div>
        <div class="stat-card">
          <h4>Đơn hàng</h4>
          <div class="value" id="totalOrders">0</div>
          <div class="trend up" id="ordersTrend"><i class="fas fa-arrow-up"></i> --</div>
        </div>
        <div class="stat-card">
          <h4>Sắp hết hàng</h4>
          <div class="value" id="lowStockProducts">0</div>
          <div class="trend down" id="stockTrend"><i class="fas fa-arrow-down"></i> --</div>
        </div>
        <div class="stat-card">
          <h4>Danh mục</h4>
          <div class="value" id="totalCategories">0</div>
          <div class="trend up" id="categoryTrend"><i class="fas fa-arrow-up"></i> --</div>
        </div>
      </div>

      <div class="charts-container">
        <div class="chart-box">
          <h3>Biểu đồ doanh thu</h3>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="chart-box">
          <h3>Cơ cấu sản phẩm</h3>
          <canvas id="categoryChart"></canvas>
        </div>
      </div>

      <div class="top-products">
        <h3>Sản phẩm bán chạy nhất</h3>
        <table>
          <thead>
            <tr>
              <th>Sản phẩm</th>
              <th>Số lượng bán</th>
              <th>Doanh thu</th>
              <th>Tình trạng</th>
            </tr>
          </thead>
          <tbody id="topProductsBody"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="./report.js"></script>
</body>

</html>
