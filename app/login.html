<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | ShopAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
      :root {
          --primary-color: #3498db;
          --primary-dark: #2980b9;
          --bg-color: #f4f7f6;
          --text-color: #2c3e50;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      
      body {
          background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .login-container {
          background: white;
          padding: 40px;
          border-radius: 15px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.1);
          width: 100%;
          max-width: 400px;
          text-align: center;
      }

      .login-header {
          margin-bottom: 30px;
      }

      .login-header h2 {
          color: var(--text-color);
          font-size: 2rem;
          margin-bottom: 10px;
      }

      .login-header p {
          color: #7f8c8d;
      }

      .input-group {
          position: relative;
          margin-bottom: 20px;
          text-align: left;
      }

      .input-group i {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          left: 15px;
          color: #95a5a6;
      }

      .input-group input {
          width: 100%;
          padding: 15px 15px 15px 45px;
          border: 1px solid #ddd;
          border-radius: 8px;
          font-size: 1rem;
          outline: none;
          transition: border-color 0.3s;
      }

      .input-group input:focus {
          border-color: var(--primary-color);
      }

      .btn-login {
          width: 100%;
          padding: 15px;
          background: var(--primary-color);
          color: white;
          border: none;
          border-radius: 8px;
          font-size: 1.1rem;
          font-weight: bold;
          cursor: pointer;
          transition: background 0.3s, transform 0.1s;
      }

      .btn-login:hover {
          background: var(--primary-dark);
      }

      .btn-login:active {
          transform: scale(0.98);
      }

      .error-msg {
          color: #e74c3c;
          font-size: 0.9rem;
          margin-bottom: 15px;
          display: none;
      }
      
      .loading-spinner {
          display: none;
      }
      
      .btn-login.loading .btn-text {
          display: none;
      }
      
      .btn-login.loading .loading-spinner {
          display: inline-block;
      }
  </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>ShopAdmin</h2>
        <p>Đăng nhập để quản lý hệ thống</p>
    </div>
    
    <div class="error-msg" id="error-message">Email hoặc mật khẩu không đúng</div>

    <form id="login-form">
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email đăng nhập" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Mật khẩu" required>
        </div>
        
        <button type="submit" class="btn-login" id="btn-submit">
            <span class="btn-text">Đăng Nhập</span>
            <span class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Đang xử lý...</span>
        </button>
    </form>
</div>

<script src="login.js"></script>
</body>
</html>
